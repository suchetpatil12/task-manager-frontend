<div class="delete-dialog">

    <div class="icon">

        🗑

    </div>

    <h2>
        Delete Project?
    </h2>

    <p>

        This action cannot be undone.

    </p>

    <div class="actions">

        <button
            class="cancel-btn"
            (click)="cancel()">

            Cancel

        </button>

        <button
            class="delete-btn"
            (click)="confirmDelete()">

            Delete

        </button>

    </div>

</div>
