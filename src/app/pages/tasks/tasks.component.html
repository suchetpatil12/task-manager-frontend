<div class="tasks-page">

    <!-- HEADER -->
    <div class="tasks-header">

        <div>

            <h1>
    {{ projectName }} 
</h1>

<p>
    Manage and track tasks for
    {{ projectName }}
</p>

        </div>

    </div>

    <!-- FILTERS + ACTIONS -->
    <div class="filters-box">

        <!-- SEARCH -->
        <input
          type="text"
          placeholder="🔍 Search task..."
          [(ngModel)]="searchKeyword"
          (input)="searchTasks()"
          class="search-input"
        />

        <!-- STATUS FILTER -->
        <select
          [(ngModel)]="selectedStatus"
          (change)="searchTasks()"
          class="filter-dropdown"
        >

            <option value="">
                All Status
            </option>

            <!-- DYNAMIC STATUS -->
            <option
              *ngFor="let status of statuses"
              [value]="status"
            >

                {{ status }}

            </option>

        </select>

        <!-- CREATE TASK BUTTON -->
        <button
          class="create-task-btn"
          (click)="openCreateTaskModal()"
        >

            + Create Task

        </button>

    </div>

    <!-- TABLE CARD -->
    <!-- TABLE CARD -->
<div class="table-card">

    <table mat-table [dataSource]="tasks">

        <!-- TITLE -->
        <ng-container matColumnDef="title">

            <th mat-header-cell *matHeaderCellDef>
                Title
            </th>

            <td mat-cell *matCellDef="let task">
                {{ task.title }}
            </td>

        </ng-container>

        <!-- STATUS -->
        <ng-container matColumnDef="status">

            <th mat-header-cell *matHeaderCellDef>
                Status
            </th>

            <td mat-cell *matCellDef="let task">

                <span
                  class="status-badge"
                  [ngClass]="{
                    'todo': task.status === 'TODO',
                    'progress': task.status === 'IN_PROGRESS',
                    'done': task.status === 'DONE'
                  }"
                >

                    {{ task.status }}

                </span>

            </td>

        </ng-container>

        <!-- PRIORITY -->
        <ng-container matColumnDef="priority">

            <th mat-header-cell *matHeaderCellDef>
                Priority
            </th>

            <td mat-cell *matCellDef="let task">

                <span
                  class="priority-badge"
                  [ngClass]="{
                    'high-priority': task.priority === 'HIGH',
                    'medium-priority': task.priority === 'MEDIUM',
                    'low-priority': task.priority === 'LOW'
                  }"
                >

                    {{ task.priority }}

                </span>

            </td>

        </ng-container>

        <!-- ASSIGNED -->
        <ng-container matColumnDef="assignedTo">

            <th mat-header-cell *matHeaderCellDef>
                Assigned To
            </th>

            <td mat-cell *matCellDef="let task">
                {{ task.assignedTo }}
            </td>

        </ng-container>

        <!-- PROJECT -->
        <ng-container matColumnDef="projectName">

            <th mat-header-cell *matHeaderCellDef>
                Project
            </th>

            <td mat-cell *matCellDef="let task">
                {{ task.projectName }}
            </td>

        </ng-container>

        <!-- ACTIONS -->
        <ng-container matColumnDef="actions">

            <th mat-header-cell *matHeaderCellDef>
                Actions
            </th>

            <td mat-cell *matCellDef="let task">

                <!-- ADMIN -->
                <div
                  *ngIf="authService.isAdmin()"
                  class="admin-actions"
                >

                    <button
                      mat-icon-button
                      color="primary"
                      (click)="editTask(task)"
                    >

                        <mat-icon>
                            edit
                        </mat-icon>

                    </button>

                    <button
                      mat-icon-button
                      color="warn"
                      (click)="deleteTask(task.id)"
                    >

                        <mat-icon>
                            delete
                        </mat-icon>

                    </button>

                </div>

                <!-- MEMBER -->
                <div *ngIf="!authService.isAdmin()">

                    <mat-select

                      [(value)]="task.status"

                      (selectionChange)="updateStatus(task)"

                      class="status-select"

                      [ngClass]="{
                        'todo-select': task.status === 'TODO',
                        'progress-select': task.status === 'IN_PROGRESS',
                        'done-select': task.status === 'DONE'
                      }"

                    >

                        <mat-option
                          *ngFor="let status of statuses"
                          [value]="status"
                        >

                            {{ status }}

                        </mat-option>

                    </mat-select>

                </div>

            </td>

        </ng-container>

        <!-- HEADER -->
        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns"
        ></tr>

        <!-- ROW -->
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
        ></tr>

    </table>

</div>

    <!-- PAGINATION -->
    <div class="pagination-box">

        <button
          mat-raised-button
          (click)="prevPage()"
          [disabled]="page === 0"
        >

            Previous

        </button>

        <span>
            Page {{ page + 1 }}
        </span>

        <button
          mat-raised-button
          (click)="nextPage()"
          [disabled]="page === totalPages - 1"
        >

            Next

        </button>

    </div>

</div>
