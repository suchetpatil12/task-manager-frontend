<div class="create-task-page">

    <div class="create-task-card">

        <h1>
            Create Task
        </h1>

        <p>
            Add a new task to your project
        </p>

        <form
          class="task-form"
          (ngSubmit)="createTask()"
        >

            <!-- TITLE -->
            <input
              type="text"
              placeholder="Task Title"
              [(ngModel)]="task.title"
              name="title"
              required
            />

            <!-- DESCRIPTION -->
            <textarea
              placeholder="Task Description"
              [(ngModel)]="task.description"
              name="description"
              required
            ></textarea>

            <!-- DATE -->
            <input
              type="date"
              [(ngModel)]="task.dueDate"
              name="dueDate"
              required
            />

            <!-- STATUS -->
            <select
              [(ngModel)]="task.status"
              name="status"
            >

                <option value="TODO">
                    TODO
                </option>

                <option value="IN_PROGRESS">
                    IN_PROGRESS
                </option>

                <option value="DONE">
                    DONE
                </option>

            </select>

            <!-- DESIGNATION -->
            <select
              [(ngModel)]="selectedDesignation"
              name="designation"
              (change)="filterUsersByDesignation()"
            >

                <option value="">
                    Select Designation
                </option>

                <option
                  *ngFor="let designation of designations"
                  [value]="designation"
                >

                    {{ designation }}

                </option>

            </select>

            <!-- ASSIGNED USER -->
            <select
              [(ngModel)]="task.assignedUserId"
              name="assignedUserId"
              required
            >

                <option [ngValue]="null">
                    Select User
                </option>

                <option
                  *ngFor="let user of filteredUsers"
                  [ngValue]="user.id"
                >

                    {{ user.name }}

                </option>

            </select>

            <!-- BUTTON -->
            <button
              type="submit"
              class="create-btn"
            >

                Create Task

            </button>

        </form>

    </div>

</div>
