<div class="projects-page">

    <!-- HEADER -->

    <div class="page-header">

        <div>

            <h1>Projects</h1>

            <p>
                Manage all your projects and tasks
            </p>

        </div>

        <!-- CREATE BUTTON -->

        <button
            *ngIf="authService.isAdmin()"
            class="create-btn"
            (click)="openCreateProjectModal()">

            + Create Project

        </button>

    </div>

    <!-- SEARCH -->

    <div class="search-box">

        <input
            type="text"
            placeholder="Search projects..."
            [(ngModel)]="searchKeyword"
            (keyup.enter)="searchProjects()"
        />

        <button
            class="search-btn"
            (click)="searchProjects()">

            Search

        </button>

    </div>

    <!-- PROJECT GRID -->

    <div class="projects-grid">

        <mat-card
            class="project-card"
            *ngFor="let project of projects">

            <!-- ACTION MENU -->

            <div
                class="project-actions"
                *ngIf="authService.isAdmin()">

                <button
                    mat-icon-button
                    [matMenuTriggerFor]="menu">

                    <mat-icon>
                        more_vert
                    </mat-icon>

                </button>

                <mat-menu #menu="matMenu">

                    <!-- EDIT -->

                    <button
                        mat-menu-item
                        (click)="editProject(project)">

                        <mat-icon>
                            edit
                        </mat-icon>

                        <span>
                            Edit Project
                        </span>

                    </button>

                    <!-- MANAGE TEAM -->

                    <button
                        mat-menu-item
                        (click)="manageTeam(project)">

                        <mat-icon>
                            groups
                        </mat-icon>

                        <span>
                            Manage Team
                        </span>

                    </button>

                    <!-- VIEW DETAILS -->

                    <button
                        mat-menu-item
                        (click)="viewDetails(project)">

                        <mat-icon>
                            analytics
                        </mat-icon>

                        <span>
                            View Details
                        </span>

                    </button>

                    <!-- DELETE -->

                    <button
                        mat-menu-item
                        (click)="deleteProject(project.id)">

                        <mat-icon>
                            delete
                        </mat-icon>

                        <span>
                            Delete Project
                        </span>

                    </button>

                </mat-menu>

            </div>

            <!-- CARD CONTENT -->

            <div
                class="project-top"
                (click)="openTasks(project.id)">

                <div class="project-icon">

                    📁

                </div>

                <div>

                    <h2>
                        {{ project.name }}
                    </h2>

                    <p>
                        {{ project.description }}
                    </p>

                </div>

            </div>

            <!-- FOOTER -->

            <div
                class="project-footer"
                (click)="openTasks(project.id)">

                <span>
                    View Tasks →
                </span>

            </div>

        </mat-card>

    </div>

    <!-- EMPTY STATE -->

    <div
        class="empty-state"
        *ngIf="projects.length === 0">

        <h3>
            No Projects Found
        </h3>

        <p>
            Try searching with another keyword
        </p>

    </div>

    <!-- PAGINATION -->

    <div
        class="pagination-box"
        *ngIf="projects.length > 0">

        <button
            class="page-btn"
            (click)="previousPage()"
            [disabled]="currentPage === 0">

            Previous

        </button>

        <span class="page-info">

            Page {{ currentPage + 1 }}
            of
            {{ totalPages }}

        </span>

        <button
            class="page-btn"
            (click)="nextPage()"
            [disabled]="currentPage >= totalPages - 1">

            Next

        </button>

    </div>

</div>
