<div class="login-container">

  <mat-card class="login-card">

    <h1>Task Manager Login</h1>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="loginData.email"
    >

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="loginData.password"
    >

    <button
      mat-raised-button
      color="primary"
      (click)="login()"
    >
      Login
    </button>

  </mat-card>

</div>
